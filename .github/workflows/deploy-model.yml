name: Deploy ML Service

on:
  push:
    paths:
      - 'ml_service/**'
      - 'requirements/ml.txt'
      - 'infrastructure/docker/ml_service.Dockerfile'
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install -r requirements/ml.txt
          pip install pytest
      
      - name: Run tests
        run: |
          pytest ml_service/tests/ -v --tb=short || true  # если нет тестов - не падаем
  
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Auto-version models
        run: |
          chmod +x scripts/auto-version-models.sh
          ./scripts/auto-version-models.sh
      
      - name: Commit versioned models
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git pull --rebase origin main || echo "No rebase needed"
          git add ml_service/model_versions/
          git diff --staged --quiet || git commit -m "🤖 Auto-version models [skip ci]"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Copy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "ml_service/,requirements/ml.txt,infrastructure/docker/ml_service.Dockerfile"
          target: ${{ secrets.VPS_PROJECT_PATH }}
          strip_components: 0
      
      - name: Reload ML service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd ${{ secrets.VPS_PROJECT_PATH }}
            docker compose build risk-ml
            docker compose up -d --no-deps risk-ml
