networks:
  docker_web-network:
    external: true

services:
  risk-db:
    build:
      context: .
      dockerfile: infrastructure/docker/database.Dockerfile
    container_name: risk-predictor-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - docker_web-network
    restart: always

  risk-ml:
    build:
      context: .
      dockerfile: infrastructure/docker/ml_service.Dockerfile
    container_name: risk-predictor-ml
    env_file: .env
    volumes:
      - ./ml_service/model_versions:/app/ml_service/model_versions
    networks:
      - docker_web-network
    restart: always

  risk-backend:
    build:
      context: .
      dockerfile: infrastructure/docker/backend.Dockerfile
    container_name: risk-predictor-backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@risk-db:5432/${POSTGRES_DB}
      ML_SERVICE_URL: http://risk-ml:8001
    depends_on:
      risk-db:
        condition: service_healthy
      risk-ml:
        condition: service_healthy
    networks:
      - docker_web-network
    restart: always

  risk-frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/frontend.Dockerfile
    container_name: risk-predictor-frontend
    environment:
      # Параметры для nginx-proxy + acme-companion
      VIRTUAL_HOST: cabg.insukuro.ru
      VIRTUAL_PORT: 80
      LETSENCRYPT_HOST: cabg.insukuro.ru
      LETSENCRYPT_EMAIL: tukhtarovilkhom@gmail.com
    networks:
      - docker_web-network
    restart: always
    depends_on:
      - risk-backend