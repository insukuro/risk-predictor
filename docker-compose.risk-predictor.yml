networks:
  web-network:
    external: true

services:
  # PostgreSQL Database
  risk-db:
    build:
      context: .
      dockerfile: infrastructure/docker/database.Dockerfile
    container_name: risk-predictor-db
    env_file:
      - .env
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - web-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ML Service
  risk-ml:
    build:
      context: .
      dockerfile: infrastructure/docker/ml_service.Dockerfile
    container_name: risk-predictor-ml
    env_file:
      - .env
    environment:
      MODELS_DIR: /app/ml_service/model_versions
      PORT: 8001
      HOST: 0.0.0.0
    volumes:
      - ./ml_service/model_versions:/app/ml_service/model_versions
    networks:
      - web-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Backend API
  risk-backend:
    build:
      context: .
      dockerfile: infrastructure/docker/backend.Dockerfile
    container_name: risk-predictor-backend
    env_file:
      - .env
    volumes:
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    networks:
      - web-network
    restart: always
    depends_on:
      risk-db:
        condition: service_healthy
      risk-ml:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@risk-db:5432/${POSTGRES_DB}
      ML_SERVICE_URL: http://risk-ml:8001
      ENVIRONMENT: ${ENVIRONMENT:-production}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Frontend
  risk-frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/frontend.Dockerfile
    container_name: risk-predictor-frontend
    environment:
      VIRTUAL_HOST: cabg.insukuro.ru
      VIRTUAL_PORT: 80
      LETSENCRYPT_HOST: cabg.insukuro.ru
      LETSENCRYPT_EMAIL: tukhtarovilkhom@gmail.com
      BACKEND_URL: http://risk-backend:8000
    networks:
      - web-network
    restart: always
    depends_on:
      risk-backend:
        condition: service_healthy
    ports:
      - "80:80"  # Для отладки