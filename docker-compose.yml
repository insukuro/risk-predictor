networks:
  docker_web-network:
    external: true

services:
  # PostgreSQL Database
  risk-db:
    build:
      context: .
      dockerfile: infrastructure/docker/database.Dockerfile
    container_name: risk-predictor-db
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - docker_web-network
    restart: always
    # ДОБАВЛЕНО: Проверка здоровья базы
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ML Service
  risk-ml:
    build:
      context: .
      dockerfile: infrastructure/docker/ml_service.Dockerfile
    container_name: risk-predictor-ml
    env_file: .env
    volumes:
      - ./ml_service/model_versions:/app/ml_service/model_versions
    networks:
      - docker_web-network
    restart: always
    # ДОБАВЛЕНО: Проверка здоровья ML сервиса
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Backend API
  risk-backend:
    build:
      context: .
      dockerfile: infrastructure/docker/backend.Dockerfile
    container_name: risk-predictor-backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@risk-db:5432/${POSTGRES_DB}
      ML_SERVICE_URL: http://risk-ml:8001
      # Передаем переменные для скрипта ожидания базы
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    depends_on:
      risk-db:
        condition: service_healthy
      risk-ml:
        condition: service_healthy
    networks:
      - docker_web-network
    restart: always

  # Frontend
  risk-frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/frontend.Dockerfile
    container_name: risk-predictor-frontend
    environment:
      VIRTUAL_HOST: cabg.insukuro.ru
      VIRTUAL_PORT: 80
      LETSENCRYPT_HOST: cabg.insukuro.ru
      LETSENCRYPT_EMAIL: tukhtarovilkhom@gmail.com
    networks:
      - docker_web-network
    restart: always
    depends_on:
      risk-backend:
        condition: service_started